<!DOCTYPE html>
<html>
<head>
    <title>API Testing & Monitoring Tool</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        input, select, button {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }
        button {
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: darkblue;
        }
        #result {
            background: white;
            padding: 15px;
            width: 60%;
            margin: auto;
            margin-top: 20px;
            text-align: left;
            border-radius: 10px;
        }
        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
            width: 70%;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background: lightgray;
        }
    </style>
</head>
<body>

<h1>🚀 API Testing & Monitoring Tool</h1>

<input type="text" id="url" placeholder="Enter API URL">
<br>

<select id="method">
    <option value="GET">GET</option>
    <option value="POST">POST</option>
</select>
<br>

<button onclick="testAPI()">Test API</button>

<div id="result"></div>

<h2>📊 API History</h2>

<table id="historyTable">
    <tr>
        <th>URL</th>
        <th>Status</th>
        <th>Time (ms)</th>
    </tr>
</table>

<script>
let historyData = [];

async function testAPI() {
    const url = document.getElementById("url").value;
    const method = document.getElementById("method").value;

    if (!url) {
        alert("Please enter API URL");
        return;
    }

    const start = performance.now();

    try {
        const response = await fetch(url, { method: method });
        const data = await response.text();
        const end = performance.now();

        const time = (end - start).toFixed(2);

        document.getElementById("result").innerHTML =
            "<b>Status:</b> " + response.status + "<br>" +
            "<b>Time:</b> " + time + " ms<br><br>" +
            "<b>Response:</b><br>" + data;

        // Save history
        historyData.push({ url, status: response.status, time });

        updateTable();

    } catch (error) {
        document.getElementById("result").innerHTML =
            "<b style='color:red;'>Error:</b> " + error;
    }
}

function updateTable() {
    const table = document.getElementById("historyTable");

    // Clear old rows except header
    table.innerHTML = `
        <tr>
            <th>URL</th>
            <th>Status</th>
            <th>Time (ms)</th>
        </tr>
    `;

    historyData.forEach(item => {
        const row = table.insertRow();
        row.insertCell(0).innerText = item.url;
        row.insertCell(1).innerText = item.status;
        row.insertCell(2).innerText = item.time;
    });
}
</script>

</body>
</html>
